<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Contact | John Doe</title>

    <meta
        name="description"
        content="Contact Ajay for projects, collaborations, and opportunities."
    >

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

    <h1>Contact</h1>

    <nav aria-label="Main Navigation">

        <ul>
            <li><a href="index.html">Home</a></li>

            <li><a href="about.html">About</a></li>

            <li><a href="projects.html">Projects</a></li>

            <li><a href="contact.html" aria-current="page">Contact</a></li>
        </ul>

    </nav>

</header>

<main>

<section aria-labelledby="contact-heading">

<h2 id="contact-heading">
Contact Form
</h2>

<form
    aria-label="Contact Form"
    action="#"
    method="post"
>

<div>

<label for="name">
Full Name
</label>

<input
    type="text"
    id="name"
    name="name"
    required
    autocomplete="name"
>

</div>

<div>

<label for="email">
Email Address
</label>

<input
    type="email"
    id="email"
    name="email"
    required
    autocomplete="email"
>

</div>

<div>

<label for="message">
Message
</label>

<textarea
    id="message"
    name="message"
    rows="6"
    required
></textarea>

</div>

<button type="submit">
Send Message
</button>

</form>

</section>

</main>

<footer>

<p>© 2026 Ajay</p>

</footer>

</body>
</html>
