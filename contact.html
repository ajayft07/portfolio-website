<section aria-labelledby="contact-heading">

<h2 id="contact-heading">Contact Form</h2>

<form action="#" method="post">

<div class="form-group">
<label for="name">Full Name</label>
<input
type="text"
id="name"
name="name"
required
autocomplete="name">
</div>

<div class="form-group">
<label for="email">Email Address</label>
<input
type="email"
id="email"
name="email"
required
autocomplete="email">
</div>

<div class="form-group">
<label for="message">Message</label>
<textarea
id="message"
name="message"
rows="6"
required></textarea>
</div>

<button type="submit">
Send Message
</button>

</form>

</section>
